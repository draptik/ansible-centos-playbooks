- name: Ensure /usr/local/bin exists
  become: true
  file:
    path: /usr/local/bin
    state: directory
    mode: "0755"

- name: Download Restic static binary
  become: true
  get_url:
    url: "https://github.com/restic/restic/releases/download/v0.16.4/restic_0.16.4_linux_amd64.bz2"
    dest: /usr/local/bin/restic.bz2
    mode: "0755"
    force: true

- name: Decompress Restic binary
  become: true
  command: bzip2 -df /usr/local/bin/restic.bz2
  args:
    creates: /usr/local/bin/restic

- name: Ensure Restic is executable
  become: true
  file:
    path: /usr/local/bin/restic
    mode: "0755"
    state: file

- name: Debug restic_backup_user and related vars
  debug:
    msg:
      - "restic_backup_user = {{ restic_backup_user }}"
      - "vault_nas_name = {{ vault_nas_name }}"
      - "restic_readeck_sftp_host_key = {{ restic_readeck_sftp_host_key }}"
      - "restic_readeck_destination_repository = {{ restic_readeck_destination_repository }}"


