- name: Ensure Restic log file exists
  become: true
  file:
    path: /var/log/restic-readeck.log
    state: touch
    mode: "0644"
    owner: "{{ restic_backup_user }}"
    group: "{{ restic_backup_user }}"

- name: Configure logrotate for Restic Readeck
  become: true
  copy:
    dest: /etc/logrotate.d/restic-readeck
    owner: root
    group: root
    mode: "0644"
    content: |
      /var/log/restic-readeck.log {
          weekly
          rotate 8
          compress
          missingok
          notifempty
          create 0644 {{ restic_backup_user }} {{ restic_backup_user }}
      }

- name: Create backup script from template
  become: true
  template:
    src: backup.sh.j2
    dest: /usr/local/bin/restic-backup.sh
    mode: "0755"

